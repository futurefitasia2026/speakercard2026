<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:30px;
  padding:40px;
  font-family:'DM Sans';
}

/* CARD */
#card {
  width:600px;
  height:600px;
  position:relative;
}

.bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGO FIXED */
.logo {
  position:absolute;
  top:20px;
  right:20px;
  width:80px;
}

.logo img {
  width:100%;
}

/* PHOTO */
.photo {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
}

.photo img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.text {
  position:absolute;
  bottom:20px;
  left:150px;
}

.name {
  font-size:40px;
  font-family:'Bebas Neue';
  color:white;
}

.title {
  font-size:13px;
  color:#77AEB6;
}

/* SIDE PANEL */
.panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* TAGS */
.box {
  background:#1b2235;
  padding:16px;
  color:white;
}

a {
  display:block;
  color:#DEFF4C;
  margin-bottom:6px;
  text-decoration:none;
}

/* CAPTION ALIGN FIX */
textarea {
  width:100%;
  height:160px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
  box-sizing:border-box;
  font-family:'DM Sans';
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="card">

<img class="bg" src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png">

<div class="logo" id="logoBox" style="display:none;">
  <img id="logoImg">
</div>

<div class="photo">
  <img id="photo">
</div>

<div class="text">
  <div class="name" id="name"></div>
  <div class="title" id="title"></div>
</div>

</div>

<!-- PANEL -->
<div class="panel">

<div class="box">
  <h3>LinkedIn Profiles</h3>
  <div id="links"></div>
</div>

<div class="box">
  <textarea id="caption" readonly></textarea>
</div>

<button onclick="copy()">Copy Caption</button>
<button onclick="openLI()">Copy + Open LinkedIn</button>
<button onclick="download()">Download</button>

</div>

<script>
function getData(){
  const raw = new URLSearchParams(window.location.search).get("data");
  return raw ? JSON.parse(decodeURIComponent(raw)) : null;
}

window.onload = () => {

  const d = getData();
  if(!d) return;

  document.getElementById('name').textContent = d.name;
  document.getElementById('title').textContent = d.job + " · " + d.company;
  document.getElementById('photo').src = d.photo;
  document.getElementById('caption').value = d.caption;

  /* LOGO FIX */
  if(d.logo){
    document.getElementById('logoImg').src = d.logo;
    document.getElementById('logoBox').style.display = "block";
  }

  /* LINKS FIX */
  const box = document.getElementById('links');

  d.links.forEach(l => {
    const a = document.createElement('a');
    a.href = l.url;
    a.target = "_blank";
    a.textContent = l.name;
    box.appendChild(a);
  });
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(document.getElementById('caption').value);
}

/* OPEN */
function openLI(){
  navigator.clipboard.writeText(document.getElementById('caption').value);
  window.open("https://www.linkedin.com/feed/", "_blank");
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('card'), {
    scale:2,
    useCORS:true
  });

  const link = document.createElement('a');
  link.download = "speaker.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
