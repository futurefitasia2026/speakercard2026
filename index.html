<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:30px;
  padding:40px;
  font-family:'DM Sans';
}

/* LEFT: CARD */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
}

/* BACKGROUND */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.7);
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.text-block {
  position:absolute;
  bottom:20px;
  left:150px;
  transform:translateX(10px);
}

.name {
  font-family:'Bebas Neue';
  font-size:40px;
  color:white;
}

.title {
  font-size:13px;
  color:#77AEB6;
}

/* RIGHT PANEL */
.side-panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* TAG BOX */
.tag-box {
  background:#1b2235;
  padding:16px;
  color:white;
}

.tag-box h3 {
  font-size:14px;
  margin-bottom:10px;
  color:white; /* FIXED */
}

.tag-box ul {
  padding-left:18px;
  font-size:14px; /* SAME SIZE */
  color:white;   /* FIXED */
}

.caption-box {
  background:#1b2235;
  padding:16px;
}

textarea {
  width:100%;
  height:140px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
  font-family:'DM Sans';
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LEFT CARD -->
<div id="speaker-card">

<img class="card-bg" src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png">

<div class="photo-frame">
  <img id="photo">
</div>

<div class="text-block">
  <div class="name" id="name"></div>
  <div class="title" id="title"></div>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="side-panel">

<div class="tag-box">
  <h3>Tag these on LinkedIn:</h3>
  <ul id="tags"></ul>
</div>

<div class="caption-box">
  <textarea id="caption" readonly></textarea>
</div>

<button onclick="copy()">Copy Caption</button>
<button onclick="copyAndOpen()">Copy + Open LinkedIn</button>
<button onclick="download()">Download Image</button>

</div>

<script>
function getParam(k){
  return new URLSearchParams(window.location.search).get(k) || '';
}

window.onload = () => {

  const name = getParam('name');
  const title = getParam('title');
  const photo = getParam('photo');
  const caption = getParam('caption');
  const tags = getParam('tags');

  if(name) document.getElementById('name').textContent = name;
  if(title) document.getElementById('title').textContent = title;
  if(photo) document.getElementById('photo').src = photo;
  if(caption) document.getElementById('caption').value = caption;

  if(tags){
    const list = tags.split("|");
    const ul = document.getElementById('tags');

    list.forEach(t => {
      const li = document.createElement('li');
      li.textContent = "@" + t;
      ul.appendChild(li);
    });
  }
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(
    document.getElementById('caption').value
  );
}

/* COPY + OPEN */
function copyAndOpen(){
  navigator.clipboard.writeText(
    document.getElementById('caption').value
  );
  window.open("https://www.linkedin.com/feed/", "_blank");
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });

  const link = document.createElement('a');
  link.download = "speaker.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
