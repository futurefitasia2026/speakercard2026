<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFA2026 Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DM Sans', sans-serif;
}

/* ===== CARD ===== */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
  overflow:hidden;
}

/* BACKDROP */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* ===== PHOTO (CENTERED PERFECTLY) ===== */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%); /* slight upward tweak to match design */
  
  width:330px;
  height:330px; /* 1:1 PERFECT SQUARE */
  
  overflow:hidden;
  z-index:2;
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

/* ===== NAME ===== */
.name {
  position:absolute;
  bottom:95px;
  left:50%;
  transform:translateX(-50%);
  
  font-family:'Bebas Neue', sans-serif;
  font-size:36px;
  letter-spacing:0.04em;
  color:white;
  text-align:center;
  z-index:3;
}

/* ===== TITLE ===== */
.title {
  position:absolute;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  
  font-size:12px;
  color:#77AEB6;
  text-transform:uppercase;
  text-align:center;
  letter-spacing:0.08em;
  z-index:3;
}

/* ===== LOGO ===== */
.logo {
  position:absolute;
  bottom:85px;
  left:60px;
  
  width:70px;
  height:40px;
  z-index:3;
}

.logo img {
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ===== DOWNLOAD BUTTON ===== */
button {
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="speaker-card">

  <!-- BACKDROP -->
  <img class="card-bg"
       src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png"
       crossorigin="anonymous">

  <!-- PHOTO -->
  <div class="photo-frame">
    <img id="photo" src="">
  </div>

  <!-- LOGO -->
  <div class="logo" id="logo-box" style="display:none;">
    <img id="logo">
  </div>

  <!-- NAME -->
  <div class="name" id="name"></div>

  <!-- TITLE -->
  <div class="title" id="title"></div>

</div>

<button onclick="download()">Download</button>

<script>
function getParam(k){
  return decodeURIComponent(new URLSearchParams(window.location.search).get(k)||'');
}

const name = getParam('name');
const title = getParam('title');
const photo = getParam('photo');
const logo = getParam('corplogo');

if(name) document.getElementById('name').textContent = name;
if(title) document.getElementById('title').textContent = title;

if(photo){
  document.getElementById('photo').src = photo;
}

if(logo){
  document.getElementById('logo').src = logo;
  document.getElementById('logo-box').style.display = 'block';
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });
  const link = document.createElement('a');
  link.download = (name || 'speaker') + '.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
