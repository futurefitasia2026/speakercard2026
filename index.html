<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:30px;
  padding:40px;
  font-family:'DM Sans';
}

/* CARD */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
}

/* BACKGROUND */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGO (FIXED) */
.logo {
  position:absolute;
  top:20px;
  right:20px;
  width:80px;
  height:auto;
  z-index:5;
}

.logo img {
  width:100%;
}

/* TEXT */
.text-block {
  position:absolute;
  bottom:20px;
  left:150px;
  transform:translateX(10px);
}

.name {
  font-family:'Bebas Neue';
  font-size:40px;
  color:white;
}

.title {
  font-size:13px;
  color:#77AEB6;
}

/* RIGHT PANEL */
.side-panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.box {
  background:#1b2235;
  padding:16px;
  color:white;
}

.box h3 {
  font-size:14px;
  margin-bottom:10px;
}

a {
  color:#DEFF4C;
  text-decoration:none;
  display:block;
  margin-bottom:6px;
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="speaker-card">

<img class="card-bg" src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png">

<!-- FIXED LOGO -->
<div class="logo" id="logoBox" style="display:none;">
  <img id="logoImg">
</div>

<div class="photo-frame">
  <img id="photo">
</div>

<div class="text-block">
  <div class="name" id="name"></div>
  <div class="title" id="title"></div>
</div>

</div>

<!-- SIDE -->
<div class="side-panel">

<div class="box">
  <h3>LinkedIn Profiles</h3>
  <div id="links"></div>
</div>

<div class="box">
  <h3>Caption</h3>
  <textarea id="caption" readonly style="width:100%;height:140px;background:#11182a;color:white;border:none;padding:10px;"></textarea>
</div>

<button onclick="copy()">Copy Caption</button>
<button onclick="copyOpen()">Copy + Open LinkedIn</button>
<button onclick="download()">Download</button>

</div>

<script>
function get(k){
  return new URLSearchParams(window.location.search).get(k) || '';
}

window.onload = () => {

  const name = get('name');
  const title = get('title');
  const photo = get('photo');
  const logo = get('logo');
  const caption = get('caption');

  if(name) document.getElementById('name').textContent = name;
  if(title) document.getElementById('title').textContent = title;
  if(photo) document.getElementById('photo').src = photo;
  if(caption) document.getElementById('caption').value = caption;

  /* FIXED LOGO */
  if(logo){
    document.getElementById('logoImg').src = logo;
    document.getElementById('logoBox').style.display = 'block';
  }

  /* LinkedIn links */
  const names = new URLSearchParams(window.location.search).getAll('li_name');
  const urls = new URLSearchParams(window.location.search).getAll('li_url');

  const container = document.getElementById('links');

  names.forEach((n, i) => {
    const a = document.createElement('a');
    a.href = urls[i];
    a.target = "_blank";
    a.textContent = n;
    container.appendChild(a);
  });
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(document.getElementById('caption').value);
}

/* COPY + OPEN */
function copyOpen(){
  navigator.clipboard.writeText(document.getElementById('caption').value);
  window.open("https://www.linkedin.com/feed/", "_blank");
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });

  const link = document.createElement('a');
  link.download = "speaker.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
