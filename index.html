<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Fit Asia 2026 — Your Speaker Card</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --navy:#232D45; --lime:#DEFF4C; --sky:#77AEB6; --orange:#DA7B3B; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px 80px; color:#F5F8F8; }
  header { text-align:center; margin-bottom:40px; }
  .brand-tag { display:inline-flex; align-items:center; gap:8px; background:var(--lime); color:var(--navy); font-size:10px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; padding:6px 14px; border-radius:2px; margin-bottom:14px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.4rem,6vw,4rem); letter-spacing:0.06em; color:#F5F8F8; line-height:1; }
  h1 span { color:var(--lime); }
  .subtitle { margin-top:10px; font-size:13px; color:var(--sky); font-weight:300; }
  .workspace { display:flex; gap:40px; align-items:flex-start; width:100%; max-width:1100px; flex-wrap:wrap; justify-content:center; }
  .panel { background:rgba(78,112,119,0.13); border:1px solid rgba(119,174,182,0.2); border-radius:4px; padding:30px; width:350px; flex-shrink:0; }
  .panel-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.12em; color:var(--lime); margin-bottom:22px; padding-bottom:12px; border-bottom:1px solid rgba(222,255,76,0.2); }
  .speaker-info-block { background:rgba(35,45,69,0.6); border:1px solid rgba(119,174,182,0.15); border-radius:2px; padding:14px; margin-bottom:20px; }
  .speaker-info-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.06em; color:#F5F8F8; line-height:1.1; }
  .speaker-info-title { font-size:12px; color:var(--sky); margin-top:3px; font-weight:300; }
  .field { margin-bottom:18px; }
  label { display:block; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--sky); font-weight:500; margin-bottom:7px; }
  textarea { width:100%; padding:11px 13px; border:1.5px solid rgba(119,174,182,0.25); border-radius:2px; font-family:'DM Sans',sans-serif; font-size:13px; color:#F5F8F8; background:rgba(35,45,69,0.7); transition:border-color 0.2s; outline:none; resize:none; line-height:1.5; }
  textarea:focus { border-color:var(--lime); background:rgba(35,45,69,0.95); }
  textarea::placeholder { color:rgba(119,174,182,0.4); }
  .char-count { font-size:10px; color:rgba(119,174,182,0.5); text-align:right; margin-top:4px; }
  .download-btn { width:100%; margin-top:6px; padding:14px; background:var(--lime); color:var(--navy); border:none; border-radius:2px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.14em; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; }
  .download-btn:hover { background:#eeff6a; transform:translateY(-2px); }
  .download-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .caption-box { display:none; margin-top:20px; border-top:1px solid rgba(119,174,182,0.2); padding-top:20px; }
  .caption-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--sky); font-weight:500; margin-bottom:8px; }
  .caption-text { background:rgba(35,45,69,0.8); border:1.5px solid rgba(119,174,182,0.2); border-radius:2px; padding:14px; margin-bottom:10px; font-size:12px; color:rgba(245,248,248,0.85); line-height:1.65; white-space:pre-wrap; max-height:160px; overflow-y:auto; }
  .copy-btn { width:100%; padding:11px; background:transparent; color:var(--lime); border:1.5px solid var(--lime); border-radius:2px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
  .copy-btn:hover { background:rgba(222,255,76,0.08); }
  .copy-btn.copied { background:var(--lime); color:var(--navy); }
  .preview-area { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .preview-label { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--sky); font-weight:500; align-self:flex-start; }
  .preview-hint { font-size:11px; color:rgba(119,174,182,0.55); }

  /* ══════════════════════════════════════
     CARD — 600×600, uses backdrop image
     Speaker photo overlaid on placeholder
     Corporate logo bottom-left of photo area
  ══════════════════════════════════════ */
  #speaker-card {
    width: 600px;
    height: 600px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: #232D45;
  }

  /* Backdrop image fills entire card */
  .card-backdrop {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* Speaker photo — overlaid on the placeholder box in backdrop
     Based on the example image, the photo box sits roughly:
     left ~255px, top ~155px, width ~330px, height ~510px
     Adjust these to align with your actual backdrop image */
  .card-photo-box {
    position: absolute;
    top: 155px;
    left: 255px;
    width: 330px;
    height: 368px;
    overflow: hidden;
    z-index: 2;
    background: rgba(78,112,119,0.2);
  }
  .card-photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .card-photo-box img.loaded { opacity: 1; }
  .card-photo-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: rgba(119,174,182,0.5);
  }
  .card-photo-placeholder span { font-size:11px; font-family:'DM Sans',sans-serif; }

  /* Corporate logo — overlaid bottom-left area of card
     Positioned so it sits below the speaker name text area */
  .card-corp-logo-box {
    position: absolute;
    bottom: 68px;
    left: 42px;
    width: 90px;
    height: 50px;
    z-index: 3;
    display: none; /* hidden until logo URL provided */
  }
  .card-corp-logo-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: left center;
  }

  /* Speaker name overlay — overlaid on card bottom-left text area
     Based on the example, name appears below photo area */
  .card-name-overlay {
    position: absolute;
    bottom: 82px;
    left: 42px;
    z-index: 3;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
    max-width: 200px;
  }
  .card-title-overlay {
    position: absolute;
    bottom: 56px;
    left: 42px;
    z-index: 3;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--sky);
    text-transform: uppercase;
    max-width: 200px;
    line-height: 1.3;
  }

  /* Quote overlay — appears over the card if speaker adds one */
  .card-quote-overlay {
    display: none;
    position: absolute;
    bottom: 16px;
    left: 42px;
    right: 16px;
    z-index: 4;
    background: rgba(35,45,69,0.85);
    border-left: 3px solid var(--lime);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-style: italic;
    color: rgba(245,248,248,0.9);
    line-height: 1.5;
    max-height: 60px;
    overflow: hidden;
  }
  .card-quote-overlay.visible { display: block; }

  @media (max-width:680px) {
    #speaker-card { width:340px; height:340px; }
    .card-photo-box { top:88px; left:144px; width:187px; height:208px; }
    .card-name-overlay { bottom:46px; left:24px; font-size:18px; max-width:114px; }
    .card-title-overlay { bottom:32px; left:24px; font-size:7px; max-width:114px; }
    .card-corp-logo-box { bottom:38px; left:24px; width:51px; height:28px; }
    .panel { width:340px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand-tag">⭐ Future Fit Asia 2026</div>
  <h1>YOUR<br><span>SPEAKER CARD</span></h1>
  <p class="subtitle">Add your quote · Download your card · Copy your LinkedIn caption</p>
</header>
<div class="workspace">

  <div class="panel">
    <p class="panel-title">YOUR CARD</p>
    <div class="speaker-info-block">
      <div class="speaker-info-name" id="display-name">—</div>
      <div class="speaker-info-title" id="display-title">—</div>
    </div>
    <div class="field">
      <label>✏️ Your Quote <span style="color:var(--lime);font-size:9px;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea id="inp-quote" rows="3" maxlength="160" placeholder="Share a memorable line from your talk… or leave blank"></textarea>
      <div class="char-count"><span id="char-count">0</span>/160</div>
    </div>
    <button class="download-btn" id="download-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      DOWNLOAD MY CARD
    </button>
    <div class="caption-box" id="caption-box">
      <p class="caption-label">📋 Your LinkedIn Caption</p>
      <div class="caption-text" id="caption-text"></div>
      <button class="copy-btn" id="copy-btn">Copy Caption</button>
    </div>
  </div>

  <div class="preview-area">
    <p class="preview-label">Live Preview</p>
    <div id="speaker-card">
      <!-- Backdrop image — the full FFA2026 template -->
      <img class="card-backdrop" id="card-backdrop"
           src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png"
           crossorigin="anonymous" alt="FFA2026 Speaker Card Backdrop">

      <!-- Speaker photo — overlaid on the grey placeholder box in backdrop -->
      <div class="card-photo-box" id="card-photo-box">
        <div class="card-photo-placeholder" id="photo-placeholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span>Photo appears here</span>
        </div>
        <img id="card-photo-img" src="" alt="Speaker" crossorigin="anonymous">
      </div>

      <!-- Corporate logo overlay (shown when provided) -->
      <div class="card-corp-logo-box" id="card-corp-logo-box">
        <img id="card-corp-logo-img" src="" alt="Company Logo" crossorigin="anonymous">
      </div>

      <!-- Speaker name + title overlaid (in case backdrop doesn't include them) -->
      <!-- These are hidden by default; only shown if backdrop doesn't have space -->
      <!-- Uncomment below if you need name/title overlaid on the card -->
      <!--
      <div class="card-name-overlay" id="card-name-overlay">SPEAKER NAME</div>
      <div class="card-title-overlay" id="card-title-overlay">Title · Organisation</div>
      -->

      <!-- Quote overlay -->
      <div class="card-quote-overlay" id="card-quote-overlay"></div>
    </div>
    <p class="preview-hint">Downloads at full resolution · perfect for LinkedIn &amp; Instagram</p>
  </div>
</div>

<script>
  function getParam(key) {
    return decodeURIComponent((new URLSearchParams(window.location.search).get(key) || ''));
  }
  const paramName    = getParam('name');
  const paramTitle   = getParam('title');
  const paramPhoto   = getParam('photo');
  const paramCaption = getParam('caption');
  const paramCorpLogo = getParam('corplogo');

  if (paramName) {
    document.getElementById('display-name').textContent = paramName;
    // If using name overlay on card, uncomment:
    // document.getElementById('card-name-overlay').textContent = paramName.toUpperCase();
  }
  if (paramTitle) {
    document.getElementById('display-title').textContent = paramTitle;
    // document.getElementById('card-title-overlay').textContent = paramTitle;
  }
  if (paramPhoto) {
    const img = document.getElementById('card-photo-img');
    const ph  = document.getElementById('photo-placeholder');
    img.onload  = () => { img.classList.add('loaded'); ph.style.display = 'none'; };
    img.onerror = () => { ph.innerHTML = '<span style="font-size:11px;color:rgba(119,174,182,0.5);padding:10px;text-align:center;font-family:DM Sans,sans-serif;">Could not load photo.</span>'; };
    img.src = paramPhoto;
  }
  if (paramCaption) {
    document.getElementById('caption-box').style.display = 'block';
    document.getElementById('caption-text').textContent = paramCaption;
  }
  if (paramCorpLogo) {
    const logoBox = document.getElementById('card-corp-logo-box');
    const logoImg = document.getElementById('card-corp-logo-img');
    logoImg.onload = () => { logoBox.style.display = 'block'; };
    logoImg.src = paramCorpLogo;
  }

  document.getElementById('inp-quote').addEventListener('input', function() {
    const val = this.value.trim();
    document.getElementById('char-count').textContent = this.value.length;
    const overlay = document.getElementById('card-quote-overlay');
    if (val) {
      overlay.textContent = '"' + val + '"';
      overlay.classList.add('visible');
    } else {
      overlay.classList.remove('visible');
    }
  });

  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('caption-text').textContent).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 2500);
    });
  });

  document.getElementById('download-btn').addEventListener('click', async () => {
    const btn = document.getElementById('download-btn');
    btn.textContent = 'GENERATING…'; btn.disabled = true;
    try {
      const canvas = await html2canvas(document.getElementById('speaker-card'), {
        scale: 1.8,
        useCORS: true,
        allowTaint: false,
        logging: false,
        backgroundColor: '#232D45'
      });
      const link = document.createElement('a');
      link.download = `FFA2026-${(paramName||'speaker').replace(/\s+/g,'-').toUpperCase()}-card.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Download failed. This can happen due to image security restrictions. Try right-clicking the preview and saving, or contact your organiser.');
      console.error(e);
    }
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> DOWNLOAD MY CARD`;
    btn.disabled = false;
  });
</script>
</body>
</html>
